name: order

services:

  postgres:
    image: postgres:16.0
    container_name: order-postgres
    restart: always
    ports:
      - 5434:5432
    volumes:
      - ./db_order :/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: example
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "5"